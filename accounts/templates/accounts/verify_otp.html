{% extends 'core/base.html' %}
{% block title %}Verify OTP — Clinic Recorder{% endblock %}

{% block content %}
<div style="max-width:440px;margin:40px auto;">
  <div class="card">
    <h1 class="page-title" style="margin-bottom:8px;">Verify OTP</h1>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:20px;">
      Enter the 6-digit code sent to your email.
    </p>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label>Enter OTP</label>
        <input type="text" name="otp" class="form-control" maxlength="6" placeholder="000000" autofocus autocomplete="off" style="font-size:24px;text-align:center;letter-spacing:8px;">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Verify OTP</button>
    </form>
    <div style="text-align:center;margin-top:16px;">
      <a href="{% url 'accounts:forgot_password' %}" style="font-size:13px;">← Resend OTP</a>
    </div>
  </div>
</div>
{% endblock %}
